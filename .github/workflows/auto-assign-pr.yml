name: Auto Assign and Review Pull Requests

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  assign:
    name: Assign and request review
    runs-on: ubuntu-latest

    steps:
      - name: Assign PR to RocketDelivery2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-assignee "RocketDelivery2" \
            --add-reviewer "RocketDelivery2"
