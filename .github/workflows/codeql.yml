name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "30 8 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  CodeQL:
    name: CodeQL
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ "csharp" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Disable default CodeQL setup
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $result = gh api repos/{owner}/{repo}/code-scanning/default-setup `
            --method PATCH -f state=not-configured 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Could not disable default CodeQL setup (may already be disabled or requires admin): $result"
          } else {
            Write-Output "Default CodeQL setup disabled successfully."
          }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Locate solution file
        shell: pwsh
        run: |
          $solutions = Get-ChildItem -Recurse -Include "*.sln","*.slnx"
          $sln = ($solutions | Where-Object { $_.Extension -eq '.sln' } | Select-Object -First 1)
          if (-not $sln) {
            $sln = ($solutions | Where-Object { $_.Extension -eq '.slnx' } | Select-Object -First 1)
          }
          if (-not $sln) {
            Write-Error "No .sln or .slnx file found in the repository."
            exit 1
          }
          Write-Output "Found solution: $($sln.FullName)"
          "SOLUTION_PATH=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
