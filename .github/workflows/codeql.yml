name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "30 8 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  CodeQL:
    name: CodeQL
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ "csharp" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Disable default CodeQL setup
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          Write-Output "Disabling default CodeQL setup for $repo ..."
          $result = gh api "repos/$repo/code-scanning/default-setup" `
            --method PATCH -f state=not-configured 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to disable default CodeQL setup: $result"
            Write-Error "Ensure the GITHUB_TOKEN has 'security-events: write' permission, or disable the default setup manually in Settings > Code security."
            exit 1
          }
          Write-Output "Default CodeQL setup disabled successfully."
          # Verify the change took effect
          $state = (gh api "repos/$repo/code-scanning/default-setup" | ConvertFrom-Json).state
          if ($state -ne 'not-configured') {
            Write-Error "Default CodeQL setup state is still '$state' after patching. SARIF upload will fail."
            exit 1
          }
          Write-Output "Verified: default setup state is '$state'."

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Locate solution file
        shell: pwsh
        run: |
          $solutions = Get-ChildItem -Recurse -Include "*.sln","*.slnx"
          $sln = ($solutions | Where-Object { $_.Extension -eq '.sln' } | Select-Object -First 1)
          if (-not $sln) {
            $sln = ($solutions | Where-Object { $_.Extension -eq '.slnx' } | Select-Object -First 1)
          }
          if (-not $sln) {
            Write-Error "No .sln or .slnx file found in the repository."
            exit 1
          }
          Write-Output "Found solution: $($sln.FullName)"
          "SOLUTION_PATH=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
