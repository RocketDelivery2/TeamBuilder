name: Markdown

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdown.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdown.yml"

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"
