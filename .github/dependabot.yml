# .github/dependabot.yml
# Dependabot version updates for TeamBuilder.
# Keeps NuGet packages, .NET SDK references, and GitHub Actions up to date.

version: 2

updates:
  # NuGet packages for the .NET solution/projects
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    target-branch: "main"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.AspNetCore.*"
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      test-dependencies:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "Moq"
          - "coverlet*"
          - "Microsoft.NET.Test.Sdk"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # .NET SDK updates if global.json exists
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "America/New_York"
    target-branch: "main"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "dotnet-sdk"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions workflow dependency updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/New_York"
    target-branch: "main"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
